<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>qingzhenting.github.io</title>
  <style>
    :root {
      --bg: #f5f2ea;
      --panel: rgba(255,255,255,0.82);
      --text: #1f1b16;
      --muted: #6a6156;
      --line: rgba(78, 61, 42, 0.14);
      --accent: #7b2d26;
      --accent-soft: rgba(123, 45, 38, 0.08);
      --shadow: 0 28px 56px rgba(36, 28, 20, 0.08);
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at top left, rgba(123,45,38,0.06), transparent 24%),
        radial-gradient(circle at 84% 10%, rgba(170,132,70,0.10), transparent 18%),
        linear-gradient(180deg, #f8f4ed 0%, var(--bg) 32%, #efe7d9 100%);
      color: var(--text);
      font-family: "Songti SC", "STSong", "Noto Serif SC", serif;
    }
    body {
      padding: 28px 18px 56px;
    }
    .shell {
      width: min(980px, 100%);
      margin: 0 auto;
    }
    .hero {
      padding: 28px 24px;
      border: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(255,252,248,0.94), rgba(248,241,231,0.92));
      box-shadow: var(--shadow);
      border-radius: 20px;
    }
    .eyebrow {
      color: var(--accent);
      font-size: 12px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      font-weight: 700;
    }
    h1 {
      margin: 14px 0 10px;
      font-size: clamp(34px, 7vw, 58px);
      line-height: 1.04;
      letter-spacing: -0.03em;
    }
    .hero p {
      margin: 0;
      max-width: 40rem;
      line-height: 1.9;
      color: var(--muted);
      font-size: 16px;
    }
    .grid {
      margin-top: 20px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 18px;
    }
    .entry-card {
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-height: 220px;
      padding: 22px 20px;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: var(--panel);
      box-shadow: var(--shadow);
      color: inherit;
      text-decoration: none;
      transition: transform 160ms ease, box-shadow 160ms ease, border-color 160ms ease;
    }
    .entry-card:hover {
      transform: translateY(-2px);
      border-color: rgba(123,45,38,0.22);
      text-decoration: none;
    }
    .entry-top {
      display: flex;
      justify-content: flex-start;
      align-items: center;
    }
    .entry-tag {
      display: inline-flex;
      align-items: center;
      padding: 5px 10px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.04em;
    }
    .entry-card h2 {
      margin: 0;
      font-size: 28px;
      line-height: 1.2;
    }
    .entry-card p {
      margin: 0;
      line-height: 1.85;
      color: var(--muted);
      flex: 1;
    }
    .entry-link {
      display: inline-flex;
      align-items: center;
      font-weight: 700;
      color: var(--accent);
    }
    @media (max-width: 640px) {
      body { padding: 16px 12px 36px; }
      .hero { padding: 22px 18px; }
      .entry-card { min-height: 0; }
      .entry-card h2 { font-size: 24px; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="hero">
      <div class="eyebrow">Project Index</div>
      <h1>qingzhenting.github.io</h1>
      <p>静态项目入口页。各项目按子目录发布，根目录只负责导航，不再直接承载单个项目内容。</p>
    </header>
    <section class="grid">
      <a class="entry-card" href="/video-to-texts/index.html"><div class="entry-top"><span class="entry-tag">Video Tools</span></div><h2>视频转文本</h2><p>视频转录、摘要和导出</p><span class="entry-link">进入</span></a>
    </section>
  </main>
</body>
</html>
